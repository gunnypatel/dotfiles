# =============================================
# tmux.conf — custom configuration
# =============================================
# Replaced oh-my-tmux (gpakosz/.tmux) base + .local override pattern with a
# single self-contained config. Bindings and defaults were carried over from
# oh-my-tmux verbatim to preserve muscle memory; everything else (theme
# machine, magic status variables, pollers, _apply_* rewriters, platform
# branches) was dropped as unused or replaced by TPM plugins.
#
# Managed by chezmoi. Edit via `chezmoi edit ~/.config/tmux/tmux.conf`
# (or edit this source file directly); apply with `chezmoi apply`.
#
# Architecture:
#   ~/.config/tmux/tmux.conf   -> THIS FILE
#   ~/.config/tmux/plugins/    -> TPM + plugins (cloned by chezmoi
#                                  run_once_bootstrap-tmux-plugins.sh, and
#                                  re-cloned by TPM on prefix + I)
# TPM auto-detects the XDG plugin dir because the config lives under
# ~/.config/tmux.

# =============================================
# General / Terminal
# =============================================
# tmux-256color (upgraded from oh-my-tmux's conservative screen-256color).
# The truecolor override is harmless if the terminal can't do 24-bit.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Low escape-time so vim/nvim Esc is responsive. focus-events lets editors
# autoread when their pane regains focus.
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

# Generous scrollback (oh-my-tmux shipped a low 5000).
set -g history-limit 50000

# Legacy UTF-8 options removed in tmux 2.2+; -q silences the error on any
# older server that still expects them.
set -q -g status-utf8 on
setw -q -g utf8 on

# =============================================
# Display
# =============================================
# 1-indexed windows and panes (matches keyboard), automatic renaming, and
# renumber-on-close so there are no gaps.
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

# aggressive-resize: resize windows based on the smallest client actually
# viewing that window (not the smallest client of the session). Matters for
# grouped sessions and multi-monitor setups. Disabled on iTerm2 by tmux-sensible
# due to a resize bug; safe on other terminals.
setw -g aggressive-resize on

# Terminal title: "session:window - host".
set -g set-titles on
set -g set-titles-string "#S:#I #W - #h"

set -g display-panes-time 800
set -g display-time 4000
set -g status-interval 10

# Flag activity in non-active windows; suppress the popup message.
set -g monitor-activity on
set -g visual-activity off

# Mouse on permanently (oh-my-tmux ships it off with a prefix+m toggle).
set -g mouse on

# Extended keys disabled - csi-u desyncs iTerm2 mouse events and garbles
# Ctrl+key sequences. Re-enable per-terminal if needed.
# set -g extended-keys on
# set -g extended-keys-format csi-u

# =============================================
# Prefixes
# =============================================
# Both C-b (tmux default) and C-a (screen-style). C-a C-a sends a literal C-a.
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# =============================================
# Mode
# =============================================
setw -g mode-keys vi

# =============================================
# Config management
# =============================================
# Edit the chezmoi source (source of truth). After saving, run
# `chezmoi apply && prefix+r` to deploy and reload.
bind e new-window -n 'tmux.conf' 'chezmoi edit ~/.config/tmux/tmux.conf'
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# =============================================
# Sessions
# =============================================
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# =============================================
# Windows
# =============================================
unbind n
unbind p

# Splits and new windows inherit the current pane's path. (oh-my-tmux did
# this via the _apply_bindings rewriter; here it's explicit.)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r C-h previous-window
bind -r C-l next-window
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1
bind Tab last-window

# =============================================
# Pane navigation (repeatable)
# =============================================
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# =============================================
# Pane resize (repeatable, 2 cells per press)
# =============================================
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# =============================================
# Buffers
# =============================================
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# =============================================
# Clear screen + scrollback (no prefix)
# =============================================
# Shadows the default prefix-less next-window; use prefix+C-l for next-window.
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# =============================================
# Copy mode (vi)
# =============================================
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
# Note: tmux-yank (loaded below) overrides copy-mode-vi `y` to also pipe the
# selection to the system clipboard, so the plain copy-selection binding
# above is only a fallback if tmux-yank ever fails to load.

# =============================================
# TPM Plugins
# =============================================
# @plugin_dir is a convenience option for the manual save/restore bindings
# below; TPM itself auto-detects the XDG plugin dir.
set -g @plugin_dir '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'gunnypatel/tmux-assistant-resurrect'
set -g @plugin 'gunnypatel/tmux-claude-pane-picker'
# Theme. Requires a Nerd Font for the icon glyphs.
# (TPM only supports 'user/repo' or full git URLs - NOT 'user/repo#version'.
#  To pin a version, checkout the tag inside the cloned plugin dir.)
set -g @plugin 'catppuccin/tmux'

# =============================================
# Plugin Settings
# =============================================

# Resurrect - session saving
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Continuum - automatic session saving/restoring
set -g @continuum-restore 'on'
set -g @continuum-save-interval '3'

# Free up prefix+u for the Claude pane picker
set -g @fzf-url-bind 'x'
set -g @tpm-update 'C-u'

# tmux-which-key - use the shipped example menu (skip the YAML build step,
# which needs a vendored pyyaml that isn't included in the git checkout)
set -g @tmux-which-key-disable-autobuild 1

# =============================================
# Theme: catppuccin
# =============================================
set -g @catppuccin_flavor 'mocha'                # latte | frappe | macchiato | mocha
set -g @catppuccin_window_status_style 'rounded' # basic | rounded | slanted | custom

# Status modules. catppuccin v2 requires explicit status-left/right set with
# format expansion (E:) of the per-module options. Available modules include:
# application, battery, cpu, date_time, directory, host, load, ram, session,
# uptime, user, weather (some need extra plugins like tmux-cpu/tmux-battery).
# See https://github.com/catppuccin/tmux/tree/main/docs/reference/status-line.md
set -g status-left-length 100
set -g status-right-length 100
set -g status-position top                    # top | bottom (default)
set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right ""

# =============================================
# Custom key bindings
# =============================================

# Manual save/restore
bind C-s run-shell '#{@plugin_dir}/tmux-resurrect/scripts/save.sh' \; display "Session saved!"
bind C-r run-shell '#{@plugin_dir}/tmux-resurrect/scripts/restore.sh' \; display "Session restored!"

# tmux-sessionizer - fuzzy-pick a project under ~/projects and jump to it.
# Creates a named session (folder basename) if it doesn't exist; switches if it does.
# Search paths configured in ~/.config/tmux-sessionizer/tmux-sessionizer.conf
# Script is on PATH (installed by chezmoi to ~/.local/bin).
bind S run-shell "tmux neww tmux-sessionizer"

# =============================================
# Initialize TPM
# =============================================
run '#{@plugin_dir}/tpm/tpm'
