# Spawn fish as the interactive shell
shell fish

# Theme (vendored; matches fish + tmux + wezterm)
include theme/catppuccin-mocha.conf

# JetBrainsMono Nerd Font — required for catppuccin/tmux status-line icons
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
